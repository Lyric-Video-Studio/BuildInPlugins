# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build, test, sign and package a WPF or Windows Forms desktop application
# built on .NET Core.
# To learn how to migrate your existing application to .NET Core,
# refer to https://docs.microsoft.com/en-us/dotnet/desktop-wpf/migration/convert-project-from-net-framework
#
# To configure this workflow:
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# 2. Signing
# Generate a signing certificate in the Windows Application
# Packaging Project or add an existing signing certificate to the project.
# Next, use PowerShell to encode the .pfx file using Base64 encoding
# by running the following Powershell script to generate the output string:
#
# $pfx_cert = Get-Content '.\SigningCertificate.pfx' -Encoding Byte
# [System.Convert]::ToBase64String($pfx_cert) | Out-File 'SigningCertificate_Encoded.txt'
#
# Open the output file, SigningCertificate_Encoded.txt, and copy the
# string inside. Then, add the string to the repo as a GitHub secret
# and name it "Base64_Encoded_Pfx."
# For more information on how to configure your signing certificate for
# this workflow, refer to https://github.com/microsoft/github-actions-for-desktop-apps#signing
#
# Finally, add the signing certificate password to the repo as a secret and name it "Pfx_Key".
# See "Build the Windows Application Packaging project" below to see how the secret is used.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: .NET Core Desktop

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    #strategy:
    #  matrix:
    #    configuration: [Debug, Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    #env:
    #  Solution_Name: your-solution-name                         # Replace with your solution name, i.e. MyWpfApp.sln.
    #  Test_Project_Path: your-test-project-path                 # Replace with the path to your test project, i.e. MyWpfApp.Tests\MyWpfApp.Tests.csproj.
    #  Wap_Project_Directory: your-wap-project-directory-name    # Replace with the Wap project directory relative to the solution, i.e. MyWpfApp.Package.
    #  Wap_Project_Path: your-wap-project-path                   # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Execute all unit tests in the solution
    #- name: Execute unit tests
    #  run: dotnet test

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Publish all
      run: .\publish.bat publish

    - name: Sign built DLLs
      shell: pwsh
      env:
        SIGNING_CERT_BASE64: ${{ secrets.BUILD_SIGNING_CERT_BASE64 }}
        SIGNING_CERT_PASSWORD: ${{ secrets.BUILD_SIGNING_CERT_PASSWORD }}
      run: |
        $ErrorActionPreference = 'Stop'

        if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERT_BASE64)) {
          throw 'GitHub secret BUILD_SIGNING_CERT_BASE64 is missing.'
        }

        $certificatePath = Join-Path $env:RUNNER_TEMP 'build-signing-cert.pfx'
        [System.IO.File]::WriteAllBytes(
          $certificatePath,
          [System.Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
        )

        $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe |
          Sort-Object FullName -Descending |
          Select-Object -First 1 -ExpandProperty FullName

        if (-not $signtool) {
          throw 'signtool.exe was not found on the GitHub Actions runner.'
        }

        $dllFiles = Get-ChildItem -Path .\publish -Recurse -Filter *.dll -File
        if (-not $dllFiles) {
          throw 'No DLL files were found under .\publish to sign.'
        }

        $signArguments = @(
          'sign'
          '/fd', 'SHA256'
          '/f', $certificatePath
          '/tr', 'http://timestamp.digicert.com'
          '/td', 'SHA256'
        )

        if (-not [string]::IsNullOrWhiteSpace($env:SIGNING_CERT_PASSWORD)) {
          $signArguments += @('/p', $env:SIGNING_CERT_PASSWORD)
        }

        foreach ($dllFile in $dllFiles) {
          & $signtool @signArguments $dllFile.FullName

          if ($LASTEXITCODE -ne 0) {
            throw "Signing failed for $($dllFile.FullName)"
          }
        }

        Remove-Item -LiteralPath $certificatePath -Force
      
    - name: Zip artifacts
      shell: pwsh
      run: |
        cd publish
        Compress-Archive -Path ./* -DestinationPath ./plugins.zip

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Plugins
        path: .\publish\plugins.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install Linux signing tools
      run: |
        sudo apt-get update
        sudo apt-get install -y osslsigncode zip

    - name: Publish and sign Linux plugins
      env:
        BUILD_SIGNING_CERT_BASE64: ${{ secrets.BUILD_SIGNING_CERT_BASE64 }}
        BUILD_SIGNING_CERT_PASSWORD: ${{ secrets.BUILD_SIGNING_CERT_PASSWORD }}
      run: ./publish.sh publish-linux/plugins linux-x64

    - name: Zip Linux artifacts
      run: |
        cd publish-linux
        zip -qr plugins-linux-x64.zip plugins

    - name: Upload Linux build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Plugins-linux-x64
        path: publish-linux/plugins-linux-x64.zip

  release:
    needs: [build, build-linux]
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'pull_request' && github.base_ref == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: Plugins
          path: publish/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: Plugins-linux-x64
          path: publish/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: publish/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_KEY }}
